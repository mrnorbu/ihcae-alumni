<!-- IHCAE Alumni Network - Main Application Template -->
<div class="min-h-screen bg-gray-50">
  <!-- Main Application Content -->
  <main class="min-h-screen">
    <router-outlet></router-outlet>
  </main>

  <!-- Global Notifications -->
  <div class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2.5 w-80 pointer-events-none">
    @for (notification of notifications$ | async; track notification.id) {
      <div
        class="w-full bg-white border rounded-xl shadow-lg overflow-hidden pointer-events-auto"
        [ngClass]="{
          'border-green-200': notification.type === 'success',
          'border-red-200':   notification.type === 'error',
          'border-amber-200': notification.type === 'warning',
          'border-blue-200':  notification.type === 'info'
        }"
      >
        <div class="flex items-start gap-3 p-3.5">
          <!-- Icon -->
          <div class="shrink-0 mt-0.5">
            @if (notification.type === 'success') {
              <div class="w-7 h-7 rounded-full bg-green-100 flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
              </div>
            } @else if (notification.type === 'error') {
              <div class="w-7 h-7 rounded-full bg-red-100 flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01" />
                </svg>
              </div>
            } @else if (notification.type === 'warning') {
              <div class="w-7 h-7 rounded-full bg-amber-100 flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01" />
                </svg>
              </div>
            } @else {
              <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center">
                <svg class="w-3.5 h-3.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01" />
                </svg>
              </div>
            }
          </div>
          <!-- Text -->
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-neutral-900">{{ notification.title }}</p>
            <p class="text-xs text-neutral-500 mt-0.5 leading-relaxed">{{ notification.message }}</p>
          </div>
          <!-- Close -->
          <button
            class="shrink-0 p-1 rounded-lg text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 transition-colors"
            (click)="notificationService.removeNotification(notification.id)"
          >
            <svg class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
    }
  </div>
</div>
